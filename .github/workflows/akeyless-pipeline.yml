name: Akeyless Dynamic Secret Demo

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  local-demo:
    runs-on: windows-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Set up Docker
      uses: docker/setup-buildx-action@v2

    - name: Start Postgres DB
      shell: powershell
      run: |
        docker run -d `
          --name postgres-db `
          -e POSTGRES_USER=admin `
          -e POSTGRES_PASSWORD=admin123 `
          -e POSTGRES_DB=testdb `
          -p 5432:5432 `
          postgres
        Start-Sleep -Seconds 10

    - name: Start Akeyless Gateway
      shell: powershell
      run: |
        docker run -d `
          -p 8000:8000 `
          -p 5696:5696 `
          --name akeyless-gateway `
          akeyless/base:latest-akeyless
        Start-Sleep -Seconds 20

    - name: Test Gateway Health
      shell: powershell
      run: |
        curl.exe -X GET http://localhost:8000/health

    - name: Fetch Dynamic Secret (Example)
      shell: powershell
      run: |
        # Shembull i thjeshtë: do përdorim API lokal për demo
        # Zëvendëso me SDK ose API reale për DB
        Write-Host "Fetching dynamic secret from Akeyless..."
        $secret = "demo-dynamic-secret-value"
        Write-Host "Fetched Secret: $secret"

    - name: Cleanup
      shell: powershell
      run: |
        docker stop akeyless-gateway, postgres-db
        docker rm akeyless-gateway, postgres-db
