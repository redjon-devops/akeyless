name: Akeyless Postgres Pipeline

on:
  push:
    branches:
      - main

jobs:
  setup-akeyless:
    runs-on: ubuntu-latest
    env:
      AKEYLESS_GITHUB_TOKEN: ${{ secrets.AKEYLESS_GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Akeyless CLI
        run: |
          curl -o akeyless https://akeyless-cli.s3.us-east-2.amazonaws.com/cli/latest/production/cli-linux-amd64
          chmod +x akeyless
          mkdir -p $HOME/.local/bin
          mv akeyless $HOME/.local/bin/
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Authenticate to Akeyless
        run: |
          echo "$AKEYLESS_GITHUB_TOKEN" > token.txt
          akeyless auth github --token-file token.txt --profile default
          akeyless auth list
          
      - name: Create PostgreSQL Target
        run: |
          akeyless target create postgresql \
            --name "/demo/postgres-target" \
            --host "host.docker.internal" \
            --port 5432 \
            --username "admin" \
            --password "admin123" \
            --db-name "testdb"

      - name: Create Dynamic Secret
        run: |
          akeyless dynamic-secret create postgresql \
            --name "/demo/postgres-secret" \
            --target-name "/demo/postgres-target" \
            --username "dynuser" \
            --password "dynpass"

      - name: Get Secret Value
        run: |
          akeyless dynamic-secret get-value \
            --name "/demo/postgres-secret"
