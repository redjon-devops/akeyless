name: Akeyless Dynamic Secret Demo

on:
  workflow_dispatch:

jobs:
  dynamic-secret-demo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Akeyless CLI
        run: |
          curl -o akeyless https://akeyless-cli.s3.us-east-2.amazonaws.com/cli/latest/production/cli-linux-amd64
          chmod +x akeyless
          mkdir -p $HOME/.akeyless/bin
          mv akeyless $HOME/.akeyless/bin/
          echo "$HOME/.akeyless/bin" >> $GITHUB_PATH

      - name: Verify CLI
        run: |
          akeyless --version

      - name: Authenticate with Akeyless
        env:
          AKEYLESS_ACCESS_ID: ${{ secrets.AKEYLESS_ACCESS_ID }}
          AKEYLESS_ACCESS_KEY: ${{ secrets.AKEYLESS_ACCESS_KEY }}
        run: |
          TOKEN=$(akeyless auth \
            --access-id "$AKEYLESS_ACCESS_ID" \
            --access-key "$AKEYLESS_ACCESS_KEY" \
            --json | jq -r '.token')
          echo "TOKEN=$TOKEN" >> $GITHUB_ENV

      - name: Get Dynamic Secret
        run: |
          akeyless get-dynamic-secret-value \
            --name "/Candidate GitHub Access/login/redjon-devops/postgres-secret" \
            --token "$TOKEN" \
            --json > secret.json
          cat secret.json

      - name: Extract Secret Values
        run: |
          echo "DB_USER=$(jq -r '.username' secret.json)" >> $GITHUB_ENV
          echo "DB_PASS=$(jq -r '.password' secret.json)" >> $GITHUB_ENV
          echo "DB_HOST=$(jq -r '.host' secret.json)" >> $GITHUB_ENV
          echo "DB_NAME=$(jq -r '.db_name' secret.json)" >> $GITHUB_ENV

      - name: Install PostgreSQL Client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Test Database Connection
        env:
          PGPASSWORD: ${{ env.DB_PASS }}
        run: |
          psql \
            -h "$DB_HOST" \
            -U "$DB_USER" \
            -d "$DB_NAME" \
            -c "SELECT version();"
