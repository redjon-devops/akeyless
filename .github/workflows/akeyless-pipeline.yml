name: Akeyless Demo Pipeline

on:
  workflow_dispatch:

jobs:
  demo:
    runs-on: ubuntu-latest

    steps:
      - name: Install Akeyless CLI
        run: |
          curl -o akeyless https://akeyless-cli.s3.us-east-2.amazonaws.com/cli/latest/production/cli-linux-amd64
          chmod +x akeyless
          sudo mv akeyless /usr/local/bin/

      - name: Auth to Akeyless
        env:
          ACCESS_ID: ${{ secrets.AKEYLESS_ACCESS_ID }}
          ACCESS_KEY: ${{ secrets.AKEYLESS_ACCESS_KEY }}
        run: |
          akeyless auth --access-id "$ACCESS_ID" --access-key "$ACCESS_KEY"

      - name: Create Target
        run: |
          akeyless target create postgres \
            --name "/ci/postgres" \
            --host "host.docker.internal" \
            --port 5433 \
            --username "admin" \
            --password "admin123" \
            --db-name "testdb"

      - name: Create Dynamic Secret
        run: |
          akeyless dynamic-secret create postgres \
            --name "/ci/postgres-secret" \
            --target-name "/ci/postgres"

      - name: Fetch Secret
        run: |
          akeyless dynamic-secret get-value \
            --name "/ci/postgres-secret"
